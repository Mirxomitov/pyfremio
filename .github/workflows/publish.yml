name: Publish to PyPI

# Publishes the package to PyPI whenever a GitHub Release is published,
# and can also be triggered manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest

    # Required for PyPI Trusted Publishing (OIDC). No API token needed.
    permissions:
      id-token: write

    # Optional: matches the "environment name" field in the PyPI trusted publisher form.
    environment:
      name: pypi
      url: https://pypi.org/project/pyfremio/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
